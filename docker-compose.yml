version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: attribly
      POSTGRES_USER: attribly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attribly"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: attribly
      CLICKHOUSE_USER: attribly
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./data/schemas/clickhouse:/docker-entrypoint-initdb.d
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9010:9000"
      - "9001:9001"

  # ─── Application Services ─────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app

  auth:
    build:
      context: ./services/auth
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: auth
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/auth:/app

  tracking:
    build:
      context: ./services/tracking
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: tracking
    ports:
      - "8001:8001"
    depends_on:
      - kafka
      - redis
    volumes:
      - ./services/tracking:/app

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: ingestion
    command: python -m base
    depends_on:
      - kafka
      - postgres
    volumes:
      - ./services/ingestion:/app

  etl:
    build:
      context: ./services/etl
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: etl
    command: python main.py
    depends_on:
      - kafka
      - clickhouse
      - minio
    volumes:
      - ./services/etl:/app

  ml:
    build:
      context: ./services/ml
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: ml
    depends_on:
      - clickhouse
      - redis
    volumes:
      - ./services/ml:/app
      - ml_models:/app/models

  reporting:
    build:
      context: ./services/reporting
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: reporting
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    depends_on:
      - clickhouse
      - minio
    volumes:
      - ./services/reporting:/app

  segmentation:
    build:
      context: ./services/segmentation
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: segmentation
    command: python main.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/segmentation:/app
      - ./services:/services

  notifications:
    build:
      context: ./services/notifications
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: notifications
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    depends_on:
      - redis
    volumes:
      - ./services/notifications:/app

  ads-integrations:
    build:
      context: ./services/ads-integrations
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: ads-integrations
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    volumes:
      - ./services/ads-integrations:/app

  ml-attribution:
    build:
      context: ./services/ml-attribution
      dockerfile: ../../infra/docker/Dockerfile.ml
    env_file: .env
    environment:
      SERVICE_NAME: ml-attribution
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload
    ports:
      - "8005:8005"
    depends_on:
      - clickhouse
      - redis
      - kafka
    volumes:
      - ./services/ml-attribution:/app
      - ml_models:/app/models

  ai-assistant:
    build:
      context: ./services/ai-assistant
      dockerfile: ../../infra/docker/Dockerfile.python
    env_file: .env
    environment:
      SERVICE_NAME: ai-assistant
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/ai-assistant:/app

  linkengine-api:
    build:
      context: ./services/linkengine-api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: linkengine-api
      DB_HOST: postgres
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    volumes:
      - ./services/linkengine-api:/app

  celery-worker:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.python
    command: celery -A app.celery worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/api-gateway:/app

  celery-beat:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.python
    command: celery -A app.celery beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/api-gateway:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.node
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ─── Reverse Proxy ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - api-gateway
      - reporting
      - notifications
      - tracking
      - ads-integrations
      - ml-attribution
      - ai-assistant
      - linkengine-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Observability ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  minio_data:
  ml_models:
  prometheus_data:
  grafana_data:
  certbot_webroot:
