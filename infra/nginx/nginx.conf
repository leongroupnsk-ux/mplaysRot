# ──────────────────────────────────────────────────────────────────────────────
# Attribly — nginx reverse proxy
#
# Traffic flow (all on port 80/443):
#   /                        → frontend:3000   (SPA, try_files for client-side routing)
#   /api/reporting/          → reporting:8002  (CSV export microservice)
#   /ws                      → notifications:8003  (WebSocket fan-out)
#   /api/                    → api-gateway:8000
#   /t/<trax_id>             → tracking:8001   (click redirect, low-latency)
#
# HTTP → HTTPS redirect is handled by the first server block.
# TLS certificates are expected at /etc/nginx/ssl/{cert,key}.pem.
# For local dev without TLS, point NGINX_SSL=0 and use the plain HTTP block.
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time up_rt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Client body / timeouts ────────────────────────────────────────────────
    client_max_body_size    16m;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Tight limit for auth endpoints (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
    # General API limit per IP
    limit_req_zone $binary_remote_addr zone=api:10m     rate=120r/m;
    # Tracking is high-volume; higher limit but still protected
    limit_req_zone $binary_remote_addr zone=tracking:5m rate=300r/m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream api_gateway {
        server api-gateway:8000;
        keepalive 32;
    }

    upstream reporting {
        server reporting:8002;
        keepalive 8;
    }

    upstream notifications_ws {
        server notifications:8003;
        keepalive 8;
    }

    upstream tracking {
        server tracking:8001;
        keepalive 32;
    }

    upstream ads_integrations {
        server ads-integrations:8004;
        keepalive 16;
    }

    upstream ml_attribution {
        server ml-attribution:8005;
        keepalive 16;
    }

    upstream ai_assistant {
        server ai-assistant:8006;
        keepalive 16;
    }

    upstream linkengine {
        server linkengine-api:8007;
        keepalive 16;
    }

    # ── Shared proxy headers ──────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern TLS config (Mozilla Intermediate)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS (6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        add_header X-Frame-Options DENY                              always;
        add_header X-Content-Type-Options nosniff                   always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── WebSocket: notifications ──────────────────────────────────────────
        location /ws {
            proxy_pass         http://notifications_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Long timeout — WebSocket connections stay open
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Reporting microservice ────────────────────────────────────────────
        # Frontend calls /api/reporting/* → reporting service at /
        location /api/reporting/ {
            rewrite ^/api/reporting/(.*) /$1 break;
            proxy_pass         http://reporting;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Presigned URL generation can take a moment
            proxy_read_timeout 30s;

            limit_req zone=api burst=20 nodelay;
        }

        # ── Auth endpoints (rate-limited tightly) ─────────────────────────────
        location ~ ^/api/auth/(login|register) {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            limit_req zone=auth burst=5 nodelay;
        }

        # ── Ads Integrations microservice ─────────────────────────────────────
        location /api/ads-integrations/ {
            rewrite ^/api/ads-integrations/(.*) /$1 break;
            proxy_pass         http://ads_integrations;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            limit_req zone=api burst=20 nodelay;
        }

        # ── ML Attribution microservice ───────────────────────────────────────
        location /api/ml-attribution/ {
            rewrite ^/api/ml-attribution/(.*) /$1 break;
            proxy_pass         http://ml_attribution;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            limit_req zone=api burst=30 nodelay;
        }

        # ── AI Assistant microservice ─────────────────────────────────────────
        location /api/ai/ {
            rewrite ^/api/ai/(.*) /$1 break;
            proxy_pass         http://ai_assistant;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # AI requests may take longer
            proxy_read_timeout 30s;
            limit_req zone=api burst=10 nodelay;
        }

        # ── Main API gateway ──────────────────────────────────────────────────
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            limit_req zone=api burst=60 nodelay;
        }

        # ── Tracking redirect service ─────────────────────────────────────────
        # /t/<trax_id> — click tracking, high-volume, must be fast
        location /t/ {
            proxy_pass         http://tracking;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Clicks are read-heavy; no buffering for minimal latency
            proxy_buffering    off;

            limit_req zone=tracking burst=100 nodelay;
        }

        # ── Short link redirects ──────────────────────────────────────────────
        # /l/{short_code} → api-gateway /v1/links/redirect/{short_code}
        location /l/ {
            rewrite ^/l/(.*)$ /v1/links/redirect/$1 break;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;

            limit_req zone=api burst=100 nodelay;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Static asset caching ──────────────────────────────────────────────
        location ~* \.(js|css|woff2|woff|ttf|png|jpg|jpeg|svg|ico|webp)$ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires            1y;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }

        # ── Health check (internal) ───────────────────────────────────────────
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
