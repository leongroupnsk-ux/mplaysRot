worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr "$request" $status rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 16m;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=300r/m;

    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    upstream api_gateway {
        server api-gateway:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── Авторизация (жёсткий лимит) ──────────────────────────────────────
        location ~ ^/api/v1/auth/(login|register) {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            limit_req zone=auth burst=5 nodelay;
        }

        # ── Короткие ссылки /l/{code} → api-gateway redirect ─────────────────
        location /l/ {
            rewrite ^/l/(.*)$ /v1/links/redirect/$1 break;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            limit_req zone=api burst=100 nodelay;
        }

        # ── API gateway ───────────────────────────────────────────────────────
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            limit_req zone=api burst=60 nodelay;
        }

        # ── Swagger UI (/docs прямо из api-gateway) ──────────────────────────
        location /docs {
            proxy_pass         http://api_gateway/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
        location /openapi.json {
            proxy_pass         http://api_gateway/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Статика (кэш 1 год) ──────────────────────────────────────────────
        location ~* \.(js|css|woff2|woff|ttf|png|jpg|jpeg|svg|ico|webp)$ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            expires            1y;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check ─────────────────────────────────────────────────────
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
