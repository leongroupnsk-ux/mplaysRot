global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: tracking
    static_configs:
      - targets: ["tracking:8001"]
    metrics_path: /metrics

  - job_name: ingestion
    static_configs:
      - targets: ["ingestion:8002"]
    metrics_path: /metrics

  - job_name: ml
    static_configs:
      - targets: ["ml:8003"]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9092"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]
    metrics_path: /metrics
