apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting
  namespace: attribly
  labels:
    app: reporting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting
  template:
    metadata:
      labels:
        app: reporting
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: reporting
          image: ghcr.io/YOUR_ORG/reporting:latest
          ports:
            - containerPort: 8002
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SERVICE_NAME
              value: reporting
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: reporting
  namespace: attribly
spec:
  selector:
    app: reporting
  ports:
    - port: 8002
      targetPort: 8002
