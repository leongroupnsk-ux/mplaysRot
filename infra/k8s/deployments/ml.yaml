apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml
  namespace: attribly
  labels:
    app: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml
  template:
    metadata:
      labels:
        app: ml
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: ml
          image: ghcr.io/YOUR_ORG/ml:latest
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SERVICE_NAME
              value: ml
          volumeMounts:
            - name: ml-models
              mountPath: /app/models
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: ml-models
          persistentVolumeClaim:
            claimName: ml-models-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: attribly
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
