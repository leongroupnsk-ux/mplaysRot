apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: attribly
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: celery-worker
          image: ghcr.io/YOUR_ORG/api-gateway:latest
          command: ["celery", "-A", "app.celery", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
