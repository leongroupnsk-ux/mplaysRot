apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: attribly
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: /api
            - name: VITE_REPORTING_URL
              value: /api/reporting
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: attribly
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
