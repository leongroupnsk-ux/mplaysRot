apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: attribly
  labels:
    app: celery-beat
spec:
  # Must always be 1 — multiple beat instances would double-schedule all tasks.
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: celery-beat
          image: ghcr.io/YOUR_ORG/api-gateway:latest
          command: ["celery", "-A", "app.celery", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
