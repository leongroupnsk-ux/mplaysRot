apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking
  namespace: attribly
  labels:
    app: tracking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracking
  template:
    metadata:
      labels:
        app: tracking
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: tracking
          image: ghcr.io/YOUR_ORG/tracking:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SERVICE_NAME
              value: tracking
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tracking
  namespace: attribly
spec:
  selector:
    app: tracking
  ports:
    - port: 8001
      targetPort: 8001
