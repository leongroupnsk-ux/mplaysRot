apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attribly
  namespace: attribly
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rate limiting — mirrors nginx.conf zones
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "120"
    # WebSocket support for /ws
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Strip /api/reporting prefix before forwarding
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  tls:
    - hosts:
        - attribly.example.com   # ← replace with your domain
      secretName: attribly-tls   # cert-manager or manually created TLS Secret
  rules:
    - host: attribly.example.com
      http:
        paths:
          # WebSocket — notifications service
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notifications
                port:
                  number: 8003

          # Reporting API (prefix stripped by rewrite-target above)
          - path: /api/reporting(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: reporting
                port:
                  number: 8002

          # Tracking pixel — high throughput, separate backend
          - path: /t(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tracking
                port:
                  number: 8001

          # All other /api/* → api-gateway
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000

          # Frontend SPA — catch-all
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 3000
