apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tracking
  namespace: attribly
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tracking
  # Tracking handles high-volume click ingestion — wider scale range.
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
