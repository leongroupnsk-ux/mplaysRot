version: "3.9"

# ── Минимальный стек для тестирования ────────────────────────────────────────
# Включает только: диплинки, аналитика переходов, магазины WB/Ozon, логистика
#
# Запуск:
#   docker compose -f docker-compose.test.yml up --build
#
# Сервис доступен на: http://localhost:8080
# API Swagger:        http://localhost:8080/docs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── База данных ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: attribly
      POSTGRES_USER: attribly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attribly"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Кэш / сессии ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # ── Backend API ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.python
    restart: unless-stopped
    env_file: .env.test
    environment:
      SERVICE_NAME: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend SPA ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.node
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api-gateway

  # ── Nginx (HTTP, без SSL) ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-gateway
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s

volumes:
  postgres_data:
  redis_data:
